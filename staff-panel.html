<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1"
    >

    <meta
        name="description"
        content="Manage Union Roleplay applications, support tickets and transcripts."
    >

    <title>Staff Panel | Union Roleplay</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet"
    >

    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        body.staff-panel-page {
            visibility: hidden;
        }

        body.staff-panel-page.staff-access-ready {
            visibility: visible;
        }

        .staff-access-denied {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background:
                radial-gradient(circle at top, rgba(120, 70, 255, .22), transparent 42%),
                #0d0f18;
        }

        .staff-access-card {
            width: min(520px, 100%);
            padding: 38px;
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 22px;
            background: rgba(255, 255, 255, .055);
            backdrop-filter: blur(20px);
            box-shadow: 0 24px 70px rgba(0, 0, 0, .45);
            text-align: center;
        }

        .staff-access-card h1 {
            margin: 0 0 12px;
            font-size: clamp(30px, 6vw, 44px);
        }

        .staff-access-card p {
            margin: 0 0 26px;
            color: #b8bdd0;
            line-height: 1.7;
        }

        .staff-access-actions {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .staff-access-actions a,
        .staff-access-actions button {
            min-width: 150px;
            padding: 13px 18px;
            border: 0;
            border-radius: 12px;
            font: inherit;
            font-weight: 700;
            text-decoration: none;
            cursor: pointer;
        }

        .staff-access-primary {
            color: #fff;
            background: linear-gradient(135deg, #7c4dff, #5b32d6);
        }

        .staff-access-secondary {
            color: #fff;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .1) !important;
        }

        .staff-user-summary {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 22px;
        }

        .staff-user-avatar {
            width: 44px;
            height: 44px;
            display: grid;
            place-items: center;
            overflow: hidden;
            border-radius: 50%;
            background: rgba(124, 77, 255, .2);
            border: 1px solid rgba(255, 255, 255, .12);
            font-weight: 800;
        }

        .staff-user-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .staff-user-summary strong,
        .staff-user-summary span {
            display: block;
        }

        .staff-user-summary span {
            color: #aeb4ca;
            font-size: 14px;
        }
    </style>
</head>

<body class="staff-panel-page">

    <header id="navbar"></header>

    <main>

        <section class="staff-panel-hero">

            <div class="container">

                <div class="eyebrow">
                    MANAGEMENT PORTAL
                </div>

                <h1>
                    Staff control <span>centre.</span>
                </h1>

                <p>
                    Review applications and manage live player conversations,
                    evidence, transcripts and ticket status from one secure panel.
                </p>

                <div
                    class="staff-user-summary"
                    id="staffUserSummary"
                    hidden
                >
                    <div
                        class="staff-user-avatar"
                        id="staffUserAvatar"
                        aria-hidden="true"
                    >
                        U
                    </div>

                    <div>
                        <strong id="staffUserName">Staff member</strong>
                        <span id="staffUserRole">Authorised access</span>
                    </div>
                </div>

            </div>

        </section>

        <section class="staff-dashboard">

            <div class="container">

                <div
                    class="staff-stats"
                    id="staff-stats"
                    aria-live="polite"
                ></div>

                <div
                    class="staff-tabs"
                    role="tablist"
                    aria-label="Staff panel sections"
                >
                    <button
                        class="active"
                        type="button"
                        role="tab"
                        aria-selected="true"
                        data-staff-tab="dashboard"
                    >
                        Dashboard
                    </button>

                    <button
                        type="button"
                        role="tab"
                        aria-selected="false"
                        data-staff-tab="tickets"
                    >
                        Tickets
                    </button>

                    <button
                        type="button"
                        role="tab"
                        aria-selected="false"
                        data-staff-tab="applications"
                    >
                        Applications
                    </button>

                    <button
                        type="button"
                        role="tab"
                        aria-selected="false"
                        data-staff-tab="transcripts"
                    >
                        Transcripts
                    </button>

                    <button
                        type="button"
                        role="tab"
                        aria-selected="false"
                        data-staff-tab="settings"
                    >
                        Discord Setup
                    </button>
                </div>

                <div
                    id="staff-panel-content"
                    aria-live="polite"
                ></div>

            </div>

        </section>

    </main>

    
    

    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>

    <script>
        (function protectStaffPanel() {

            const roleConfig =
                window.UNION_CONFIG &&
                UNION_CONFIG.DISCORD &&
                UNION_CONFIG.DISCORD.ROLES
                    ? UNION_CONFIG.DISCORD.ROLES
                    : {};

            const permittedRoles = Array.isArray(UNION_CONFIG.STAFF_ROLES)
                ? UNION_CONFIG.STAFF_ROLES.map(String)
                : [
                    roleConfig.FOUNDER,
                    roleConfig.MANAGEMENT,
                    roleConfig.STAFF,
                    roleConfig.TRIAL_STAFF,
                    roleConfig.SENIOR_DEVELOPER,
                    roleConfig.DEVELOPER
                ].filter(Boolean).map(String);

            const user =
                window.Auth && typeof Auth.getUser === "function"
                    ? Auth.getUser()
                    : null;

            const hasAccess =
                user &&
                permittedRoles.some(function (roleId) {
                    return typeof Auth.hasRole === "function" &&
                        Auth.hasRole(roleId);
                });

            if (!user) {
                window.location.replace("login.html");
                return;
            }

            if (!hasAccess) {
                document.body.innerHTML = `
                    <main class="staff-access-denied">
                        <section class="staff-access-card">
                            <h1>Access denied</h1>
                            <p>
                                Your Discord account is signed in, but it does not
                                have permission to access the Union Roleplay staff panel.
                            </p>

                            <div class="staff-access-actions">
                                <a
                                    class="staff-access-primary"
                                    href="profile.html"
                                >
                                    Return to Profile
                                </a>

                                <button
                                    class="staff-access-secondary"
                                    id="staffLogoutButton"
                                    type="button"
                                >
                                    Log Out
                                </button>
                            </div>
                        </section>
                    </main>
                `;

                document.body.classList.add("staff-access-ready");

                const logoutButton =
                    document.getElementById("staffLogoutButton");

                if (logoutButton) {
                    logoutButton.addEventListener("click", function () {
                        Auth.logout();
                    });
                }

                return;
            }

            document.body.classList.add("staff-access-ready");

            window.addEventListener("DOMContentLoaded", function () {

                const summary = document.getElementById("staffUserSummary");
                const avatar = document.getElementById("staffUserAvatar");
                const name = document.getElementById("staffUserName");
                const role = document.getElementById("staffUserRole");

                if (!summary || !user) {
                    return;
                }

                const displayName =
                    user.global_name ||
                    user.displayName ||
                    user.username ||
                    "Staff member";

                if (name) {
                    name.textContent = displayName;
                }

                const matchedRole = [
                    ["Founder", roleConfig.FOUNDER],
                    ["Management", roleConfig.MANAGEMENT],
                    ["Staff", roleConfig.STAFF],
                    ["Trial Staff", roleConfig.TRIAL_STAFF],
                    ["Senior Developer", roleConfig.SENIOR_DEVELOPER],
                    ["Developer", roleConfig.DEVELOPER]
                ].find(function (entry) {
                    return entry[1] && Auth.hasRole(entry[1]);
                });

                if (role) {
                    role.textContent = matchedRole
                        ? matchedRole[0]
                        : "Authorised access";
                }

                if (avatar) {
                    const discordId = user.discord_id || user.discordId;
                    if (user.avatar && discordId) {
                        const image = document.createElement("img");
                        image.src =
                            "https://cdn.discordapp.com/avatars/" +
                            encodeURIComponent(discordId) +
                            "/" +
                            encodeURIComponent(user.avatar) +
                            ".png?size=128";
                        image.alt = displayName + " Discord avatar";
                        avatar.textContent = "";
                        avatar.appendChild(image);
                    } else {
                        avatar.textContent =
                            displayName.charAt(0).toUpperCase();
                    }
                }

                summary.hidden = false;

                document.querySelectorAll("[data-staff-tab]").forEach(
                    function (button) {
                        button.addEventListener("click", function () {
                            document.querySelectorAll("[data-staff-tab]").forEach(
                                function (tab) {
                                    const active = tab === button;
                                    tab.classList.toggle("active", active);
                                    tab.setAttribute(
                                        "aria-selected",
                                        active ? "true" : "false"
                                    );
                                }
                            );
                        });
                    }
                );
            });

        })();
    </script>

    <script src="js/main.js"></script>
    <script src="js/portal-config.js"></script>
    <script src="js/portal.js"></script>

<script>
document.addEventListener('DOMContentLoaded', () => {
  const placeholder = document.getElementById('navbar');
  if (!placeholder) return;
  fetch('components/navbar.html')
    .then(response => { if (!response.ok) throw new Error('Navigation failed to load'); return response.text(); })
    .then(html => { placeholder.outerHTML = html; })
    .catch(error => console.error(error));
});
</script>
</body>
</html>
