<!doctype html><html lang="en"><head><meta name="robots" content="noindex,nofollow"><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Signing in | Union Roleplay</title><meta property="og:site_name" content="Union Roleplay"><meta property="og:type" content="website"><meta property="og:title" content="Signing in | Union Roleplay"><meta property="og:description" content="A serious British FiveM roleplay community."><meta property="og:image" content="https://cliffy3364.github.io/Union-Roleplay/assets/images/logo.png"><meta name="twitter:card" content="summary_large_image"><meta name="theme-color" content="#07111f"><link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/refactor.css"><link rel="stylesheet" href="css/design-system.css">
<link rel="stylesheet" href="css/premium-v2.css">
<link rel="stylesheet" href="css/public-production.css">
</head><body class="login-page"><main class="login-card"><h1>Signing you in…</h1><p id="callbackMessage" class="subtitle">Confirming your Discord account.</p><a href="login.html" class="back-link" id="retryLink" hidden>Return to login</a></main><script src="js/config.js"></script><script src="js/auth.js"></script><script>
(async()=>{const message=document.getElementById('callbackMessage'),retry=document.getElementById('retryLink');try{const params=new URLSearchParams(location.search);const code=params.get('code');if(!code)throw new Error(params.get('error_description')||'Discord did not return an authorisation code.');const base=String(UNION_CONFIG.API_BASE||'').replace(/\/$/,'');if(!base||base.includes('YOUR-WORKER'))throw new Error('The backend Worker URL has not been configured.');const response=await fetch(base+'/auth/callback',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code,redirectUri:UNION_CONFIG.DISCORD.CALLBACK_URL})});if(!response.ok)throw new Error('Discord sign-in could not be completed.');const data=await response.json();Auth.saveSession(data.user,data.token||'');location.replace(sessionStorage.getItem('union_return_to')||'profile.html');}catch(error){message.textContent=error.message;retry.hidden=false;}})();
</script><script src="js/premium-v2.js"></script>
<script src="js/public-production.js"></script>
</body></html>
