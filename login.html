<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Union Roleplay</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        *{
            box-sizing:border-box;
        }

        body{

            margin:0;
            min-height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                radial-gradient(circle at top,#5d2fd4 0%,transparent 45%),
                linear-gradient(135deg,#10131c,#171c28,#22193f);

            font-family:Outfit,Arial,Helvetica,sans-serif;

            color:#fff;

        }

        .login-card{

            width:430px;
            max-width:92%;

            padding:45px;

            border-radius:22px;

            background:rgba(255,255,255,.06);

            backdrop-filter:blur(22px);

            border:1px solid rgba(255,255,255,.08);

            text-align:center;

            box-shadow:0 25px 60px rgba(0,0,0,.45);

        }

        .login-card img{

            width:140px;

            margin-bottom:25px;

        }

        h1{

            margin:0;

            font-size:34px;

            font-weight:700;

        }

        .subtitle{

            margin-top:10px;
            margin-bottom:35px;

            color:#b8bfd8;

            line-height:1.6;

        }

        .discord-btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:14px;

            background:#5865F2;

            color:#fff;

            font-size:17px;

            font-weight:600;

            cursor:pointer;

            transition:.25s;

        }

        .discord-btn:hover{

            transform:translateY(-2px);

            background:#6f7cff;

        }

        .info{

            margin-top:28px;

            color:#9ba4bf;

            font-size:14px;

            line-height:1.6;

        }

        .back-link{

            display:inline-block;

            margin-top:20px;

            color:#8f6fff;

            text-decoration:none;

            font-weight:600;

        }

        .back-link:hover{

            color:#b59dff;

        }

        .version{

            margin-top:28px;

            color:#777;

            font-size:13px;

        }

    </style>

</head>

<body>

<div class="login-card">

    <img
        src="assets/images/logo.png"
        alt="Union Roleplay Logo"
    >

    <h1>Union Roleplay</h1>

    <p class="subtitle">

        Sign in with Discord to access your profile,
        applications, staff permissions and future website
        features.

    </p>

    <button
        class="discord-btn"
        type="button"
        onclick="login()">

        Continue with Discord

    </button>

    <div class="info">

        ✔ Secure Discord Authentication<br>
        ✔ Automatic role detection<br>
        ✔ Staff permissions synced automatically

    </div>

    <a
        href="about.html"
        class="back-link">

        ← Return to Website

    </a>

    <div class="version">

        Union Roleplay v1.0

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>

<script>

function login() {

    /*
        Temporary login.
        This will later be replaced with
        Discord OAuth.
    */

    Auth.saveUser({

        id: "123456789",

        username: "Livify",

        avatar: "",

        roles: [

            UNION_CONFIG.DISCORD.ROLES.FOUNDER

        ]

    });

    window.location.href = "about.html";

}

</script>

</body>

</html>
