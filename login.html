<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login | Union Roleplay</title>

    <link rel="stylesheet" href="css/style.css">

    <style>

        body{

            margin:0;
            height:100vh;

            display:flex;
            justify-content:center;
            align-items:center;

            background:
                linear-gradient(135deg,#12131b,#1b1d2b,#2c1f4a);

            font-family:Arial,Helvetica,sans-serif;

        }

        .login-card{

            width:420px;

            padding:40px;

            border-radius:20px;

            background:rgba(255,255,255,.05);

            backdrop-filter:blur(20px);

            border:1px solid rgba(255,255,255,.1);

            text-align:center;

            color:white;

            box-shadow:0 15px 50px rgba(0,0,0,.45);

        }

        .login-card img{

            width:130px;

            margin-bottom:20px;

        }

        h1{

            margin:0;

            font-size:34px;

        }

        p{

            color:#c7c7d8;

            margin-bottom:30px;

        }

        .discord-btn{

            width:100%;

            padding:16px;

            border:none;

            border-radius:12px;

            background:#5865F2;

            color:white;

            font-size:18px;

            cursor:pointer;

            transition:.25s;

        }

        .discord-btn:hover{

            transform:translateY(-2px);

            background:#6b76f7;

        }

        .footer{

            margin-top:25px;

            font-size:14px;

            color:#999;

        }

    </style>

</head>

<body>

<div class="login-card">

    <img src="assets/images/logo.png">

    <h1>Union Roleplay</h1>

    <p>
        Serious UK FiveM Roleplay
    </p>

    <button class="discord-btn" onclick="login()">

        Continue with Discord

    </button>

    <div class="footer">

        Version 1.0

    </div>

</div>

<script>

function login() {

    localStorage.setItem("union_logged_in", "true");

    // Temporary roles for testing
    localStorage.setItem(
        "union_roles",
        JSON.stringify([
            "Founder"
        ])
    );

    window.location = "about.html";

}

</script>

</body>

</html>
