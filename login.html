<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Sign in to Union Roleplay with Discord."><title>Login | Union Roleplay</title>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="icon" href="favicon.ico"></head>
<body class="login-page"><main class="login-card">
<img src="assets/images/logo.png" alt="Union Roleplay logo"><div class="eyebrow">SECURE ACCOUNT ACCESS</div>
<h1>Continue with Discord</h1><p class="subtitle">Sign in to view your profile, applications and support requests. Staff permissions are read from your Union Roleplay Discord roles.</p>
<button class="discord-btn" id="discordLogin" type="button">Continue with Discord</button>
<p id="loginMessage" class="portal-form-message" aria-live="polite"></p>
<a href="index.html" class="back-link">← Return to website</a></main>
<script src="js/config.js"></script><script src="js/auth.js"></script>
<script>
(() => {
 const button=document.getElementById('discordLogin'); const message=document.getElementById('loginMessage');
 if(Auth.isLoggedIn()){ location.replace(new URLSearchParams(location.search).get('returnTo') || 'profile.html'); return; }
 button.addEventListener('click',()=>{
   const base=String(UNION_CONFIG.API_BASE||'').replace(/\/$/,'');
   if(!base || base.includes('YOUR-WORKER')){
     message.textContent='Discord login needs the backend Worker URL added in js/config.js first.';
     return;
   }
   const returnTo=new URLSearchParams(location.search).get('returnTo') || 'profile.html';
   sessionStorage.setItem('union_return_to', returnTo);
   location.href=base + '/api/auth/discord';
 });
})();
</script></body></html>
